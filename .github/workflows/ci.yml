name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20, 22]
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Syntax check (all server files)
        run: |
          find server -name '*.js' -exec node -c {} +

      - name: Run tests
        run: npm test
        env:
          NODE_ENV: test
          JWT_SECRET: ci-test-secret-not-for-production
          PHI_ENCRYPTION_KEY: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef

      - name: Audit dependencies
        run: npm audit --audit-level=high
        continue-on-error: true

  security-scan:
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check for secrets in code
        run: |
          # Fail if any hardcoded secrets are found
          ! grep -rn 'password\s*=\s*["\x27][^"\x27]*["\x27]' server/ --include='*.js' \
            | grep -v 'password_hash' \
            | grep -v '\.example' \
            | grep -v 'test' \
            | grep -v 'req\.body\.password' \
            | grep -v 'newPassword' || echo "No hardcoded secrets found"

      - name: Dependency audit (strict)
        run: npm audit --audit-level=moderate

  docker-build:
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          if [ -f Dockerfile ]; then
            docker build -t agentic-ehr:ci .
          else
            echo "No Dockerfile found, skipping"
          fi
