name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      full_suite: ${{ steps.filter.outputs.full_suite }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed paths
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            full_suite:
              - 'server/**'
              - 'src/api/**'
              - 'src/context/**'
              - 'src/hooks/**'
              - 'src/pages/**'
              - 'src/components/layout/**'
              - 'src/components/patient/**'
              - 'src/components/workflow/**'
              - 'test/**'
              - 'package.json'
              - 'package-lock.json'
              - 'Dockerfile'
              - '.github/workflows/**'

  fast-checks:
    runs-on: ubuntu-latest
    needs: changes
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Syntax check (all server files)
        run: |
          find server -name '*.js' -exec node -c {} +

      - name: Lint
        run: npm run lint

      - name: Build application
        run: npm run build

  full-matrix-tests:
    runs-on: ubuntu-latest
    needs: changes
    if: github.event_name == 'push' || needs.changes.outputs.full_suite == 'true'
    strategy:
      matrix:
        node-version: [18, 20, 22]
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Syntax check (all server files)
        run: |
          find server -name '*.js' -exec node -c {} +

      - name: Run full test suite
        run: npm test
        env:
          NODE_ENV: test
          JWT_SECRET: ci-test-secret-not-for-production
          PHI_ENCRYPTION_KEY: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef

  security-scan:
    runs-on: ubuntu-latest
    needs: changes
    if: github.event_name == 'push' || needs.changes.outputs.full_suite == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check for hardcoded secrets
        run: |
          ! grep -rn 'password\s*=\s*["\x27][^"\x27]*["\x27]' server/ --include='*.js' \
            | grep -v 'password_hash' \
            | grep -v '\.example' \
            | grep -v 'test' \
            | grep -v 'req\.body\.password' \
            | grep -v 'newPassword' || echo "No hardcoded secrets found"

      - name: Dependency audit
        run: npm audit --audit-level=moderate

  docker-build:
    runs-on: ubuntu-latest
    needs: changes
    if: github.event_name == 'push' || needs.changes.outputs.full_suite == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          if [ -f Dockerfile ]; then
            docker build -t agentic-ehr:ci .
          else
            echo "No Dockerfile found, skipping"
          fi
