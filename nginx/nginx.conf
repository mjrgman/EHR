##
## Agentic EHR — Production Nginx Configuration
## TLS termination, rate limiting, security headers, reverse proxy
##
## Usage:
##   docker-compose up    (mounts this into the nginx container)
##   Or standalone:       nginx -c /path/to/nginx.conf
##

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ---- Logging ----
    log_format json_combined escape=json
        '{"time":"$time_iso8601",'
        '"remote_addr":"$remote_addr",'
        '"method":"$request_method",'
        '"uri":"$request_uri",'
        '"status":$status,'
        '"bytes":$body_bytes_sent,'
        '"referer":"$http_referer",'
        '"user_agent":"$http_user_agent",'
        '"request_time":$request_time}';

    access_log /var/log/nginx/access.log json_combined;

    sendfile on;
    keepalive_timeout 65;
    client_max_body_size 10m;

    # ---- Rate Limiting ----
    # 10 req/s per IP for general traffic
    limit_req_zone $binary_remote_addr zone=general:10m rate=10r/s;
    # 2 req/s for login (brute-force protection)
    limit_req_zone $binary_remote_addr zone=auth:10m rate=2r/s;

    # ---- Upstream ----
    upstream ehr_backend {
        server app:3000;
        # For multi-instance: add more servers here
        # server app2:3000;
    }

    # ---- HTTP → HTTPS redirect ----
    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    # ---- HTTPS Server ----
    server {
        listen 443 ssl http2;
        server_name _;

        # TLS Configuration
        ssl_certificate     /etc/nginx/ssl/cert.pem;
        ssl_certificate_key /etc/nginx/ssl/key.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers on;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 10m;

        # HSTS (HIPAA requirement: encryption in transit)
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

        # Security headers (defense in depth — also set by Express)
        add_header X-Frame-Options DENY always;
        add_header X-Content-Type-Options nosniff always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy strict-origin-when-cross-origin always;

        # ---- Static assets (served by nginx, not Express) ----
        location /assets/ {
            alias /usr/share/nginx/html/assets/;
            expires 30d;
            add_header Cache-Control "public, immutable";
        }

        # ---- Login rate limit ----
        location /api/auth/login {
            limit_req zone=auth burst=5 nodelay;
            proxy_pass http://ehr_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ---- API routes ----
        location /api/ {
            limit_req zone=general burst=20 nodelay;
            proxy_pass http://ehr_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 30s;
            proxy_connect_timeout 10s;
        }

        # ---- Health check (no rate limit) ----
        location /api/health {
            proxy_pass http://ehr_backend;
            proxy_set_header Host $host;
        }

        # ---- SPA fallback ----
        location / {
            root /usr/share/nginx/html;
            try_files $uri $uri/ /index.html;
        }
    }
}
