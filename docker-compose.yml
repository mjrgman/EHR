# ==========================================
# Agentic EHR Docker Compose Configuration
# ==========================================
# Supports both local development and production deployment
#
# Prerequisites:
#   1. Copy .env.example to .env and fill in all required values
#   2. Run: node scripts/setup.js  (generates secrets, creates admin user)
#   3. Place TLS certs at ./certs/cert.pem and ./certs/key.pem
#      (self-signed for dev: see DEPLOYMENT.md §TLS)
#
# Local dev:
#   docker-compose up
#
# Production (detached):
#   docker-compose up -d
#
# Services:
#   - agentic-ehr: Node.js/Express backend + React frontend (serves static assets)
#   - nginx: Reverse proxy with TLS termination (80→443 redirect, rate limiting)

services:
  # ==========================================
  # AGENTIC EHR APPLICATION
  # ==========================================
  agentic-ehr:
    build:
      context: .
      dockerfile: Dockerfile

    container_name: agentic-ehr-app
    restart: unless-stopped

    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_PATH: /data/agentic-ehr.db
      LOG_DIR: /data/logs

    # Internal only — nginx proxies; not exposed directly to host in production
    # Remove the "127.0.0.1:" prefix if you need direct access for debugging
    ports:
      - "127.0.0.1:3000:3000"

    volumes:
      # Persistent SQLite database — bind mount to host directory
      # Host path is created automatically by Docker if it doesn't exist
      - ehr-data:/data
      # Audit logs
      - ehr-logs:/data/logs

    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M

    # Health check uses the correct /api/health path
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/api/health', (r) => {if (r.statusCode !== 200) throw new Error(r.statusCode)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

    networks:
      - ehr-internal

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ==========================================
  # NGINX REVERSE PROXY WITH TLS
  # ==========================================
  nginx:
    image: nginx:1.27-alpine

    container_name: agentic-ehr-nginx
    restart: unless-stopped

    ports:
      - "80:80"
      - "443:443"

    volumes:
      # Single nginx.conf — located in nginx/ subdirectory
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      # TLS certificates — place cert.pem and key.pem here before starting
      - ./certs:/etc/nginx/ssl:ro
      # Shared log volume
      - ehr-logs:/var/log/nginx

    depends_on:
      agentic-ehr:
        condition: service_healthy

    networks:
      - ehr-internal

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

# ==========================================
# VOLUMES
# ==========================================
volumes:
  # SQLite database + application data
  # Uses Docker managed volume (persistent across restarts and re-creates)
  # To inspect: docker volume inspect agentic-ehr_ehr-data
  # To backup: docker run --rm -v agentic-ehr_ehr-data:/data -v $(pwd):/backup alpine tar czf /backup/ehr-data-backup.tar.gz /data
  ehr-data:
    driver: local

  # Audit logs + nginx access/error logs
  ehr-logs:
    driver: local

# ==========================================
# NETWORKS
# ==========================================
networks:
  # Isolated bridge network — nginx is the only ingress point
  ehr-internal:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16
